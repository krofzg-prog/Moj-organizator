
<script>    // TVOJ API KLJUČ - Zalijepi ga između navodnika    const API_KEY = "AIzaSyAjV_nKmiCmomVgKVkG3sIViN3Pf7rqHNU  ";
    function addTask() {        const input = document.getElementById('taskInput');        if (input.value === '') return;        const list = document.getElementById('taskList');        const li = document.createElement('li');        li.className = "flex items-center gap-2 p-2 bg-slate-50 rounded-lg";        li.innerHTML = `<input type="checkbox" class="rounded"> ${input.value}`;        list.prepend(li);        input.value = '';    }
    async function sendToAI() {        const input = document.getElementById('aiInput');        const chat = document.getElementById('chatMessages');        const userQuery = input.value.trim();                if (userQuery === '') return;
        // Prikaz korisnikove poruke        chat.innerHTML += `            <div class="flex gap-3 justify-end">                <div class="bg-blue-600 text-white p-3 rounded-2xl rounded-tr-none text-sm max-w-[80%]">${userQuery}</div>            </div>`;                input.value = '';        chat.scrollTop = chat.scrollHeight;
        // Prikaz "AI razmišlja..."        const loadingId = "loading-" + Date.now();        chat.innerHTML += `            <div id="${loadingId}" class="flex gap-3">                <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 text-xs font-bold">AI</div>                <div class="bg-slate-100 p-3 rounded-2xl rounded-tl-none text-sm text-slate-500 italic">Razmišljam...</div>            </div>`;
        try {            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {                method: 'POST',                headers: { 'Content-Type': 'application/json' },                body: JSON.stringify({                    contents: [{ parts: [{ text: userQuery }] }]                })            });
            const data = await response.json();            const aiText = data.candidates[0].content.parts[0].text;
            // Ukloni loading i prikaži pravi odgovor            document.getElementById(loadingId).remove();            chat.innerHTML += `                <div class="flex gap-3">                    <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 text-xs font-bold">AI</div>                    <div class="bg-slate-100 p-3 rounded-2xl rounded-tl-none text-sm max-w-[80%]">${aiText}</div>                </div>`;        } catch (error) {            document.getElementById(loadingId).innerHTML = "Greška: Provjeri API ključ ili internet vezu.";        }                chat.scrollTop = chat.scrollHeight;    }</script>
